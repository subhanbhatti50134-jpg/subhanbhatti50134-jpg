<svg width="860" height="130" viewBox="0 0 860 130" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="statusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="860" height="130" rx="12" fill="url(#statusGrad)" stroke="#30363D" stroke-width="1"/>
  <rect x="0" y="0" width="4" height="130" rx="2" fill="url(#accentGrad)"/>

  <!-- Pulse dot -->
  <circle cx="30" cy="38" r="5" fill="#3FB950">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <text x="46" y="43" font-size="11" fill="#6C63FF" font-weight="600" letter-spacing="3">CURRENTLY</text>

  <text x="30" y="72" font-size="14" fill="#E6EDF3">📚  Deepening Python, React &amp; Django — building real-world full-stack projects</text>
  <text x="30" y="96" font-size="14" fill="#E6EDF3">🤖  Exploring AI/Agentic systems, RAG pipelines &amp; backend architecture</text>
  <text x="30" y="120" font-size="14" fill="#E6EDF3">💡  Open to internships, collaborations &amp; open-source contributions</text>
</svg>
